<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPN Address Search Tool</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

  <style>
    /* Prevent the entire page from scrolling on desktop */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; 
      background-color: #f8f9fa;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1c1e21;
    }

    .app-wrapper {
      height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center; /* Centers the tool on the screen */
    }

    .tool-column {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 500px; /* Restricts width so it doesn't stretch too far */
      width: 100%;
    }

    .tool-card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .tool-card::-webkit-scrollbar { width: 5px; }
    .tool-card::-webkit-scrollbar-track { background: transparent; }
    .tool-card::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

    .section-title {
      font-weight: 700;
      color: #003087;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      background: white;
      padding-bottom: 10px;
    }

    .sticky-title {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .form-label {
      font-weight: 600;
      color: #6c757d;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #ced4da;
      font-size: 0.9rem;
    }

    .btn-primary { background-color: #0070ba; border: none; font-weight: 600; }
    .btn-success { font-weight: 600; font-size: 0.85rem; }

    .result-group {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #e9ecef;
      margin-top: 10px;
    }

    hr { border-color: #edf2f7; margin: 20px 0; }

    /* RESPONSIVE FIX FOR SMALLER SCREENS */
    @media (max-width: 991px) {
      html, body {
        overflow-y: auto; 
      }
      .app-wrapper {
        height: auto; 
        padding: 10px;
      }
      .tool-column {
        height: 90vh; 
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="tool-column">
      <div class="tool-card">
        <label class="form-label">Quick Search</label>
        <div class="input-group mb-3">
          <input type="text" id="jp_zip" class="form-control" placeholder="Postal Code" onkeyup="if(event.key==='Enter') jp_zipSearch()">
          <button class="btn btn-primary px-3" onclick="jp_zipSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        
        <label class="form-label">Filter by Location</label>
        <select id="jp_pref" class="form-select mb-2" onchange="jp_onPrefChange()"><option value="">Prefecture</option></select>
        <select id="jp_city" class="form-select mb-2" onchange="jp_onCityChange()"><option value="">City</option></select>
        <select id="jp_town" class="form-select mb-3"><option value="">Town</option></select>
        
        <button class="btn btn-primary w-100 mb-2" onclick="jp_locSearch()">Search Location</button>
        <div id="jp_results"></div>
      </div>
    </div>
  </div>

  <script>
    const CSV_JP = 'https://docs.google.com/spreadsheets/d/1YFoo7jsfjjdkJybpM52329vJ5pmOOct44mnZ90z3SJk/export?format=csv&gid=449666268';

    let dataJP = [];
    let treeJP = {};

    window.onload = () => {
      Papa.parse(CSV_JP, { download: true, header: true, complete: (r) => { 
        dataJP = r.data;
        dataJP.forEach(row => {
          if(!row.prefecture) return;
          if(!treeJP[row.prefecture]) treeJP[row.prefecture] = {};
          if(!treeJP[row.prefecture][row.city]) treeJP[row.prefecture][row.city] = [];
          if(row.town && !treeJP[row.prefecture][row.city].includes(row.town)) treeJP[row.prefecture][row.city].push(row.town);
        });
        const s = document.getElementById('jp_pref');
        Object.keys(treeJP).sort().forEach(p => s.add(new Option(p, p)));
      }});
    };

    /* JP Address Logic */
    function jp_onPrefChange() {
      const p = document.getElementById('jp_pref').value;
      const s = document.getElementById('jp_city');
      s.innerHTML = '<option value="">City</option>';
      if(p) Object.keys(treeJP[p]).sort().forEach(c => s.add(new Option(c, c)));
    }
    
    function jp_onCityChange() {
      const p = document.getElementById('jp_pref').value;
      const c = document.getElementById('jp_city').value;
      const s = document.getElementById('jp_town');
      s.innerHTML = '<option value="">Town</option>';
      if(p && c) treeJP[p][c].sort().forEach(t => s.add(new Option(t, t)));
    }
    
    function jp_zipSearch() { 
      jp_render(dataJP.filter(r => r.postal_code == document.getElementById('jp_zip').value.replace(/-/g,''))); 
    }
    
    function jp_locSearch() {
      const p = document.getElementById('jp_pref').value, c = document.getElementById('jp_city').value, t = document.getElementById('jp_town').value;
      jp_render(dataJP.filter(r => r.prefecture === p && r.city === c && r.town === t));
    }
    
    function jp_render(rows) {
      const cont = document.getElementById('jp_results'); cont.innerHTML = '';
      rows.forEach(r => {
        const d = document.createElement('div'); d.className = 'result-group';
        d.innerHTML = `<table class="table table-sm table-borderless mb-2">
          <tr><td><strong>〒</strong></td><td>${r.postal}</td></tr>
          <tr><td><strong>EN</strong></td><td>${r.english_address}</td></tr>
          <tr><td><strong>JP</strong></td><td>${r.japanese_address}</td></tr>
          <tr><td><strong>SF</strong></td><td>¥${r.shipping_fee}</td></tr>
          <tr><td><strong>ETA</strong></td><td>${r.lead_time}</td></tr>
        </table>
        <button class="btn btn-success btn-sm w-100" onclick="copyIt('${r.postal}\\n${r.english_address}\\n${r.japanese_address}', this)">Copy All Details</button>`;
        cont.appendChild(d);
      });
    }

    function copyIt(txt, btn) {
      const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
      el.select(); document.execCommand('copy'); document.body.removeChild(el);
      const old = btn.innerHTML; 
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied'; 
      btn.classList.replace('btn-success', 'btn-dark');
      setTimeout(() => { btn.innerHTML = old; btn.classList.replace('btn-dark', 'btn-success'); }, 1200);
    }
  </script>
</body>
</html>
